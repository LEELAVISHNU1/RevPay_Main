<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Card - RevPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/forms.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-indigo-900 p-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-800 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white">Add New Card</h2>
            <p class="text-indigo-300 text-sm mt-1">Securely link a new payment method</p>
        </div>

        <form method="post" th:action="@{/cards/add}" class="p-8 space-y-4" id="addCardForm">
            
            <div th:if="${success}" class="p-3 bg-green-50 text-green-700 text-xs rounded-lg border border-green-100 font-semibold" th:text="${success}"></div>
            <div th:if="${error}" class="p-3 bg-red-50 text-red-700 text-xs rounded-lg border border-red-100 font-semibold" th:text="${error}"></div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Card Number</label>
                <input type="text" name="cardNumber" maxlength="16" placeholder="0000 0000 0000 0000" 
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition font-mono tracking-widest" 
                       required>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Card Holder Name</label>
                <input type="text" name="holderName" placeholder="Full Name" 
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition uppercase" 
                       required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Expiry (MM/YY)</label>
                    <input type="text" name="expiry" placeholder="08/28" maxlength="5"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" 
                           required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">CVV</label>
                    <input type="password" name="cvv" maxlength="3" placeholder="***"
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" 
                           required>
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-200 transition transform hover:-translate-y-0.5 active:scale-95 mt-4">
                Link Card
            </button>

            <div class="flex justify-between items-center pt-4">
                <a href="/cards" class="text-xs text-indigo-600 hover:underline font-semibold tracking-tight">View My Cards</a>
                <a href="/dashboard" class="text-xs text-gray-400 hover:text-indigo-600 transition font-medium">Back to Dashboard</a>
            </div>
        </form>
    </div>

    <script th:src="@{/js/validation.js}"></script>
</body>
</html>
