<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RevPay - Login</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS -->
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            
            <!-- Header -->
            <div class="auth-header">
                <i class="fas fa-bolt"></i>
                <h2>Welcome Back</h2>
                <p>Sign in to your RevPay account</p>
            </div>
            
            <!-- Alert Messages -->
            <div th:if="${error}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>
            
            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}"></span>
            </div>
            
            <div th:if="${param.error}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i>
                Invalid email or password
            </div>
            
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                Logged out successfully
            </div>
            
            <!-- Login Form -->
            <form method="post" th:action="@{/login}" th:object="${login}">
                
                <!-- Email Field -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" 
                           class="form-control" 
                           th:field="*{username}" 
                           placeholder="Enter your email"
                           required>
                    <div class="error-message" th:errors="*{username}"></div>
                </div>
                
                <!-- Password Field -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div style="position: relative;">
                        <input type="password" 
                               class="form-control" 
                               th:field="*{password}" 
                               placeholder="Enter your password"
                               required
                               id="password">
                        <button type="button" 
                                onclick="togglePassword('password', 'toggleIcon')"
                                style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer;">
                            <i class="far fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                    <div class="error-message" th:errors="*{password}"></div>
                </div>

                <!-- ✅ Forgot Password Link (ADDED HERE) -->
				<div class="d-flex justify-content-between align-items-center mt-2 mb-4">
				    <div class="form-check">
				        </div>
				    <a href="/forgot-password" class="forgot-password-link">
				        <i class="fas fa-key me-1"></i> Forgot Password?
				    </a>
				</div>
                
                <!-- Submit Button -->
                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </button>
            </form>
            
            <!-- Register Link -->
            <div class="auth-link mt-3">
                <p>Don't have an account? <a href="/register">Create one</a></p>
            </div>
        </div>
    </div>
    
    <!-- Weather Widget -->
    <div class="weather-widget">
        <i class="fas fa-cloud-sun"></i>
        <span>31°C Mostly cloudy</span>
    </div>
    
    <!-- Custom JS -->
    <script th:src="@{/js/auth.js}"></script>
</body>

</html>
