<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Invoice - RevPay Business</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/forms.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-indigo-900 p-8 text-center text-white">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-teal-500 rounded-full mb-4 shadow-lg shadow-teal-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold">Create Invoice</h2>
            <p class="text-indigo-300 text-sm mt-1">Generate a bill for your customer</p>
        </div>

        <form method="post" action="/invoice/create" class="p-8 space-y-5" id="createInvoiceForm">
            
            <div th:if="${success}" class="alert-dismissible p-3 bg-green-50 text-green-700 text-sm rounded-lg border border-green-100 font-semibold" th:text="${success}"></div>
            <div th:if="${error}" class="alert-dismissible p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-100 font-semibold" th:text="${error}"></div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Customer Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" />
                        </svg>
                    </span>
                    <input type="email" name="customerEmail" placeholder="client@example.com" 
                           class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" 
                           required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Billing Amount (₹)</label>
                <div class="relative">
                     <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 font-bold">₹</span>
                     <input type="number" step="0.01" name="amount" placeholder="0.00"
                            class="w-full pl-8 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition font-semibold" 
                            required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Description / Service</label>
                <input type="text" name="description" placeholder="e.g. Web Development Service"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Due Date</label>
                <input type="date" name="dueDate" 
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" 
                       required>
            </div>

            <button type="submit" 
                    class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-teal-200 transition transform hover:-translate-y-0.5 active:scale-95 mt-2">
                Generate Invoice
            </button>

            <div class="text-center pt-2">
                <a href="/dashboard" class="text-sm text-gray-400 hover:text-indigo-600 transition font-medium">
                    &larr; Back to Dashboard
                </a>
            </div>
        </form>
    </div>

    <script th:src="@{/js/validation.js}"></script>
</body>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const dueDateInput = document.querySelector('input[name="dueDate"]');
    
    const today = new Date().toISOString().split("T")[0];
    dueDateInput.setAttribute("min", today);
});
</script>
</html>
