<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - RevPay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/forms.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
        <div class="bg-indigo-900 p-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-800 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-white">New Password</h2>
            <p class="text-indigo-300 text-sm mt-1">Please secure your account with a new password.</p>
        </div>

        <form method="post" th:action="@{/reset-password}" class="p-8 space-y-5" id="resetPasswordForm">
            
            <div th:if="${error}" class="alert-dismissible p-3 bg-red-50 text-red-600 text-sm rounded-lg border border-red-100" th:text="${error}"></div>
            <div th:if="${success}" class="alert-dismissible p-3 bg-green-50 text-green-600 text-sm rounded-lg border border-green-100" th:text="${success}"></div>

            <input type="hidden" name="email" th:value="${email}" />

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">New Password</label>
                <input type="password" name="password" id="newPassword"
                       placeholder="••••••••"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" 
                       required minlength="6">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Confirm New Password</label>
                <input type="password" id="confirmPassword"
                       placeholder="••••••••"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" 
                       required minlength="6">
            </div>

            <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-200 transition transform hover:-translate-y-0.5 active:scale-95 mt-2">
                Update Password
            </button>

            <div class="text-center pt-2">
                <a href="/login" class="text-sm text-gray-400 hover:text-indigo-600 transition font-medium">
                    &larr; Back to Login
                </a>
            </div>
        </form>
    </div>

    <script th:src="@{/js/validation.js}"></script>
</body>
</html>
