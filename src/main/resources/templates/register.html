<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RevPay - Register</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS -->
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            
            <!-- Header -->
            <div class="auth-header">
                <i class="fas fa-bolt"></i>
                <h2>Create Account</h2>
                <p>Join RevPay today</p>
            </div>
            
            <!-- Alert Messages -->
            <div th:if="${error}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>
            
            <div th:if="${success}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}"></span>
            </div>
            
            <!-- Registration Form -->
            <form method="post" th:action="@{/register}" th:object="${user}">
                
                <!-- Full Name -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user"></i> Full Name
                    </label>
                    <input type="text" 
                           class="form-control" 
                           th:field="*{fullName}" 
                           placeholder="John Doe"
                           required>
                    <div class="error-message" th:errors="*{fullName}"></div>
                </div>
                
                <!-- Email -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" 
                           class="form-control" 
                           th:field="*{email}" 
                           placeholder="john@example.com"
                           required>
                    <div class="error-message" th:errors="*{email}"></div>
                </div>
                
                <!-- Phone -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-phone"></i> Phone
                    </label>
                    <input type="tel" 
                           class="form-control" 
                           th:field="*{phone}" 
                           placeholder="+91 9876543210"
                           required>
                    <div class="error-message" th:errors="*{phone}"></div>
                </div>
                
                <!-- Password -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div style="position: relative;">
                        <input type="password" 
                               class="form-control" 
                               th:field="*{password}" 
                               placeholder="Create a strong password"
                               required
                               id="password">
                        <button type="button" 
                                onclick="togglePassword('password', 'toggleIcon')"
                                style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer;">
                            <i class="far fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                    <div class="error-message" th:errors="*{password}"></div>
                </div>
				
				<!-- Transaction PIN -->
				<div class="form-group">
				    <label class="form-label">
				        <i class="fas fa-key"></i> Transaction PIN (4 digits)
				    </label>
				    <input type="password"
				           class="form-control"
				           th:field="*{transactionPin}"
				           placeholder="Enter 4-digit PIN"
				           minlength="4"
				           maxlength="4"
				           pattern="[0-9]{4}"
				           required>
				</div>
				

                <!-- Favorite Color (NEW FIELD) -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-palette"></i> Favorite Color
                    </label>
                    <input type="text"
                           class="form-control"
                           th:field="*{favoriteColor}"
                           placeholder="Example: Blue"
                           required>
                    <small class="text-muted">
                        This will be used for password recovery.
                    </small>
                    <div class="error-message" th:errors="*{favoriteColor}"></div>
                </div>
                
                <!-- Role -->
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user-tag"></i> Account Type
                    </label>
                    <select class="form-select" th:field="*{role}" required>
                        <option value="">Select account type</option>
                        <option value="PERSONAL">Personal</option>
                        <option value="BUSINESS">Business</option>
                    </select>
                    <div class="error-message" th:errors="*{role}"></div>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="btn-primary mt-3">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </form>
            
            <!-- Login Link -->
            <div class="auth-link mt-3">
                <p>Already have an account? <a href="/login">Sign in</a></p>
            </div>
        </div>
    </div>
    
    <!-- Weather Widget -->
    <div class="weather-widget">
        <i class="fas fa-cloud-sun"></i>
        <span>31°C Mostly cloudy</span>
    </div>
    
    <!-- Custom JS -->
    <script th:src="@{/js/auth.js}"></script>
</body>

</html>
