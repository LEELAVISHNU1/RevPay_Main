# Application Name
spring.application.name=RevPay

# Server
server.port=9999

# MySQL Database Configuration

spring.datasource.url=jdbc:mysql://localhost:3306/revpay?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Majaykiran@2004

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# folder to store loan documents
loan.upload.dir=uploads/loans

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Security
spring.security.user.name=admin
spring.security.user.password=admin

# Logging
logging.level.org.springframework=INFO
logging.level.com.revpay=DEBUG